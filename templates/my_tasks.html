{% extends "base.html" %}
{% block title %}My Tasks{% endblock %}
{% block content %}
<h2>My Tasks</h2>
<table class="task-table">
    <tr><th>Task</th><th>Project</th><th>Deadline</th><th>Priority</th><th>Status</th></tr>
    {% for t in tasks %}
    <tr>
        <td><a href="{{ url_for('task_detail', task_id=t.task_id) }}">{{ t.title }}</a></td>
        <td>{{ t.project_name }}</td>
        <td>{{ t.deadline }}</td>
        <td>{{ t.priority }}</td>
        <td>
    <form method="POST" action="{{ url_for('update_task_status', task_id=t.task_id) }}">
        <select name="status" onchange="this.form.submit()">
            <option value="pending" {% if t.status == 'pending' %}selected{% endif %}>Pending</option>
            <option value="in_progress" {% if t.status == 'in_progress' %}selected{% endif %}>In Progress</option>
            <option value="completed" {% if t.status == 'completed' %}selected{% endif %}>Completed</option>
        </select>
    </form>
</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
